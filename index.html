<style>
:root{
  --bg:        #080c2e;
  --bg2:       #0d1240;
  --bg3:       #121850;
  --border:    #1e2860;
  --border2:   #283278;
  --text:      #e8eaff;
  --muted:     #5a6aaa;
  --dim:       #8f9dcc;
  --strong:    #5096ff;
  --strong-dim:rgba(80,150,255,0.12);
  --gold:      #a06eff;
  --gold-dim:  rgba(160,110,255,0.12);
  --block:     #f87171;
  --block-dim: rgba(248,113,113,0.10);
  --green:     #4ade80;
  --green-dim: rgba(74,222,128,0.10);
  --amber:     #fb923c;
  --amber-dim: rgba(251,146,60,0.10);
  --purple:    #c084fc;
  --purple-dim:rgba(192,132,252,0.10);
  --teal:      #2dd4bf;
  --teal-dim:  rgba(45,212,191,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  min-height:100vh;
  padding:0;
  background-image:
    radial-gradient(ellipse 120% 50% at 50% 0%, rgba(40,80,180,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 80% 35% at 20% 15%, rgba(80,150,255,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(120,80,220,0.10) 0%, transparent 45%),
    radial-gradient(ellipse 50% 30% at 90% 80%, rgba(160,110,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 40% 25% at 10% 60%, rgba(80,150,255,0.04) 0%, transparent 50%),
    linear-gradient(165deg, #0a0e35 0%, #0c0a38 25%, #110842 50%, #0e0630 75%, #080c2e 100%);
  background-attachment:fixed;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(80,150,255,0.008) 2px, rgba(80,150,255,0.008) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(80,150,255,0.01) 100px, rgba(80,150,255,0.01) 101px);
}
body::after{
  content:'';position:fixed;top:0;left:0;right:0;height:500px;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 80% at 30% 0%, rgba(40,70,160,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 70% 0%, rgba(100,60,200,0.10) 0%, transparent 60%),
    linear-gradient(180deg, rgba(60,100,220,0.06) 0%, transparent 100%);
}
.page{max-width:1100px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1;}

/* HEADER */
.header{text-align:center;padding-top:32px;margin-bottom:44px;animation:fadeDown 0.6s ease both;position:relative;}
.header-logo{
  display:inline-block;
  max-width:400px;
  width:100%;
  mix-blend-mode:lighten;
  opacity:1;
  filter: brightness(1.1) contrast(0.92) saturate(1.1);
  mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
}
.header-logo-wrap{display:inline-block;}

/* TAB BAR */
.tab-bar{display:flex;justify-content:center;gap:6px;margin-top:16px;}
.tab-btn{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.10em;text-transform:uppercase;
  padding:8px 22px;border-radius:8px;cursor:pointer;transition:all 0.25s ease;
  border:1px solid rgba(80,150,255,0.18);background:transparent;color:var(--muted);
}
.tab-btn:hover{border-color:rgba(80,150,255,0.35);color:var(--dim);}
.tab-btn.active{background:rgba(80,150,255,0.14);border-color:rgba(80,150,255,0.4);color:var(--strong);font-weight:500;}

@media (max-width: 640px){
  .tab-bar{gap:8px;margin-top:12px;}
  .tab-btn{flex:1;max-width:170px;padding:8px 14px;font-size:10px;letter-spacing:0.08em;}
}

/* TODAY'S PICKS EMPTY STATE */
.today-empty{
  text-align:center;padding:60px 20px;
  font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:0.06em;
}
.today-empty-icon{font-size:28px;margin-bottom:12px;display:block;}

/* LOADING */
.loading{text-align:center;padding:80px 0;}
.loading-spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--strong);border-radius:50%;animation:spin 0.8s linear infinite;}
.loading-text{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-top:12px;}
.error-msg{text-align:center;padding:40px;color:var(--block);font-family:'DM Mono',monospace;font-size:13px;}

/* HERO STATS */
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px;animation:fadeUp 0.5s 0.1s ease both;}
@media(max-width:600px){.hero-grid{grid-template-columns:1fr;}}
.hero-card{background:rgba(13,18,64,0.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(80,150,255,0.1);border-radius:14px;padding:22px 20px;text-align:center;position:relative;overflow:hidden;transition:border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;}
.hero-card:hover{border-color:rgba(80,150,255,0.25);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.hero-card::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 80% 60% at 50% -20%, rgba(255,255,255,0.03) 0%, transparent 70%);pointer-events:none;}
.hero-card.hc-green::before{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.hero-card.hc-blue::before{background:linear-gradient(90deg,transparent,var(--strong),transparent);}
.hero-card.hc-gold::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.hero-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.hero-value{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-0.02em;}
.hero-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px;}
.val-green{color:var(--green);}
.val-red{color:var(--block);}
.val-blue{color:var(--strong);}
.val-gold{color:var(--gold);}
.val-teal{color:var(--teal);}

/* SECTION HEADERS */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;margin-top:48px;flex-wrap:wrap;position:relative;padding-bottom:10px;}
.section-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--border),transparent 80%);}
.section-icon{font-size:16px;}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);}
.section-badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:20px;letter-spacing:0.08em;text-transform:uppercase;}
.recent-picks-note{display:flex;justify-content:center;align-items:center;margin:20px 0 20px;}
.badge-blue  {background:var(--strong-dim);color:var(--strong);border:1px solid rgba(80,150,255,0.25);}
.badge-gold  {background:var(--gold-dim);  color:var(--gold);  border:1px solid rgba(160,110,255,0.30);}
.badge-green {background:var(--green-dim); color:var(--green); border:1px solid rgba(74,222,128,0.25);}
.badge-teal  {background:var(--teal-dim);  color:var(--teal);  border:1px solid rgba(45,212,191,0.25);}

/* TABLES */
.table-card{background:rgba(13,18,64,0.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(30,40,96,0.6);border-radius:14px;overflow:hidden;margin-bottom:12px;animation:fadeUp 0.5s ease both;}
table{width:100%;border-collapse:collapse;}
thead tr{background:rgba(18,24,80,0.7);}
th{padding:11px 16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid rgba(30,40,96,0.5);white-space:nowrap;}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid rgba(30,40,96,0.35);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background 0.2s ease;}
tbody tr:hover{background:rgba(80,150,255,0.04);}
th.r,td.r{text-align:right;}
th.c,td.c{text-align:center;}

/* PILLS */
.pill{display:inline-block;padding:3px 10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;white-space:nowrap;transition:box-shadow 0.2s ease;}
.pill-green{background:var(--green-dim);color:var(--green);box-shadow:0 0 8px rgba(74,222,128,0.06);}
.pill-red{background:var(--block-dim);color:var(--block);box-shadow:0 0 8px rgba(248,113,113,0.06);}
.pill-blue{background:var(--strong-dim);color:var(--strong);box-shadow:0 0 8px rgba(80,150,255,0.06);}
.pill-gold{background:var(--gold-dim);color:var(--gold);box-shadow:0 0 8px rgba(160,110,255,0.06);}
.pill-gray{background:rgba(90,106,170,0.15);color:var(--muted);}
.pill-teal{background:var(--teal-dim);color:var(--teal);box-shadow:0 0 8px rgba(45,212,191,0.06);}
.pill-purple{background:var(--purple-dim);color:var(--purple);box-shadow:0 0 8px rgba(192,132,252,0.06);}
.pill-amber{background:var(--amber-dim);color:var(--amber);box-shadow:0 0 8px rgba(251,146,60,0.06);}

/* MATRIX TABLE */
.matrix-wrap{overflow-x:auto;}
.matrix-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:12px;
}
.matrix-table th{
  padding:12px 14px;
  font-family:'DM Mono',monospace;
  font-size:10px;
  font-weight:500;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:#eef2ff;
  background:linear-gradient(180deg, rgba(34,44,118,0.98) 0%, rgba(24,31,92,0.95) 100%);
  border:1px solid rgba(120,138,255,0.20);
  text-align:center;
  white-space:nowrap;
}
.matrix-table th.row-header{
  text-align:center;
  vertical-align:middle;
  min-width:118px;
  color:#eef2ff;
}
.matrix-table td{
  padding:12px 14px;
  border:1px solid rgba(120,138,255,0.14);
  text-align:center;
  vertical-align:middle;
  background:rgba(13,18,64,0.54);
  transition:background 0.18s ease, box-shadow 0.18s ease;
}
.matrix-table tbody tr:hover td{
  background:rgba(80,150,255,0.07);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.02), inset 0 -1px 0 rgba(255,255,255,0.02);
}
.matrix-table td.row-label{
  font-family:'DM Mono',monospace;
  font-weight:500;
  font-size:10px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  text-align:center;
  vertical-align:middle;
  color:#eef2ff;
  background:linear-gradient(180deg, rgba(34,44,118,0.94) 0%, rgba(24,31,92,0.90) 100%);
}
.matrix-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-width:92px;line-height:1.05;}
.mc-record{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-0.02em;color:var(--text);}
.mc-units,.mc-roi{font-family:'DM Mono',monospace;font-weight:500;}
.mc-units{font-size:11px;}
.mc-roi{font-size:10px;color:var(--dim);}
.mc-empty{color:var(--border2);font-family:'DM Mono',monospace;font-size:12px;}
.col-group-header{
  background:linear-gradient(180deg, rgba(56,71,170,0.98) 0%, rgba(34,44,118,0.96) 100%)!important;
  border-bottom:1px solid rgba(160,176,255,0.24)!important;
  color:#ffffff!important;
}
.col-divider{border-left:2px solid rgba(160,110,255,0.22)!important;}
.matrix-table thead tr:first-child th:first-child{border-top-left-radius:12px;}
.matrix-table thead tr:first-child th:last-child{border-top-right-radius:12px;}
.matrix-table tbody tr:last-child td:first-child{border-bottom-left-radius:12px;}
.matrix-table tbody tr:last-child td:last-child{border-bottom-right-radius:12px;}
.matrix-table th span.val-blue,
.matrix-table th span.val-gold{
  font-size:10px;
  font-weight:500;
  letter-spacing:0.14em;
}
.matrix-table th span.val-blue{color:#ffffff !important;}
.matrix-table th span.val-gold{color:#ffffff !important;}
.hero-note{
  margin:-16px 0 34px;
  text-align:center;
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--dim);
}
.hero-note span{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(13,18,64,0.55);
  border:1px solid rgba(80,150,255,0.12);
}

/* PERIOD CARDS */
.period-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
@media(max-width:700px){.period-grid{grid-template-columns:1fr;}}
.period-card{background:rgba(13,18,64,0.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(30,40,96,0.5);border-radius:14px;padding:18px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease both;transition:border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;}
.period-card:hover{border-color:rgba(80,150,255,0.2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.25);}
.period-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.period-card.pc-7::before{background:linear-gradient(90deg,transparent,var(--teal),transparent);}
.period-card.pc-15::before{background:linear-gradient(90deg,transparent,var(--strong),transparent);}
.period-card.pc-30::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.period-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.period-record{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin-bottom:6px;}
.period-stats{display:flex;gap:14px;margin-top:4px;}
.period-stat{font-family:'DM Mono',monospace;font-size:12px;}
.period-stat-label{font-size:10px;color:var(--muted);margin-bottom:2px;font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;}

/* RECENT PICKS */
.picks-scroll{overflow-x:auto;}
.picks-scroll table{min-width:900px;}
td.game-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.result-w{color:var(--green);font-weight:500;}
.result-l{color:var(--block);font-weight:500;}
.profit-pos{color:var(--green);font-family:'DM Mono',monospace;font-size:12px;}
.profit-neg{color:var(--block);font-family:'DM Mono',monospace;font-size:12px;}

/* FOOTER */
.footer{text-align:center;margin-top:52px;padding-top:20px;border-top:1px solid rgba(30,40,96,0.4);}
.footer-refresh{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.06em;}

/* ANIMATIONS */
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* Center first column */
.breakdown-matrix td:first-child, .breakdown-matrix th:first-child {
    text-align:center !important;
}

/* Make Premium/Strong/Value Dog header text white */
.premium, .strong, .value-dog {
    color:#ffffff !important;
}

/* --- Matrix alignment fixes --- */
.breakdown-table th:first-child,
.breakdown-table td:first-child{
  text-align:center !important;
  vertical-align:middle !important;
}

/* Tier header text color */
.breakdown-table th.tier-header{
  color:#ffffff !important;
}


/* Final matrix header fixes */
.matrix-table th.row-header,
.matrix-table td.row-label,
.matrix-table tbody td:first-child,
.matrix-table thead th:first-child{
  text-align:center !important;
  vertical-align:middle !important;
}
.matrix-table th span.val-blue,
.matrix-table th span.val-gold,
.matrix-table th .val-blue,
.matrix-table th .val-gold{
  color:#ffffff !important;
}



/* MOBILE / TABLET RESPONSIVE IMPROVEMENTS */
@media (max-width: 900px){
  .page{padding:0 16px 64px;}
  .header{padding-top:20px;margin-bottom:28px;}
  .header-logo{max-width:320px;}
  .section-header{margin-top:36px;margin-bottom:14px;gap:10px;}
  .section-title{font-size:12px;letter-spacing:0.12em;}
  .hero-note{margin:-10px 0 24px;font-size:10px;letter-spacing:0.06em;}
  .hero-note span{padding:7px 10px;gap:6px;}

  .hero-grid{gap:12px;}
  .hero-card{padding:18px 14px;border-radius:12px;}
  .hero-value{font-size:24px;}
  .hero-label{font-size:9px;}
  .hero-sub{font-size:10px;}

  .period-grid{gap:12px;}
  .period-card{padding:15px 14px;border-radius:12px;}
  .period-record{font-size:20px;}
  .period-stats{gap:10px;flex-wrap:wrap;}

  .table-card{border-radius:12px;}
  th, td{padding:10px 12px;}

  .matrix-wrap,
  .picks-scroll{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:thin;
    padding-bottom:4px;
  }

  .matrix-table{min-width:620px;}
  .matrix-table th,
  .matrix-table td.row-label{padding:10px 12px;font-size:9px;}
  .matrix-table td{padding:10px 12px;}
  .matrix-table th.row-header{min-width:92px;position:sticky;left:0;z-index:3;}
  .matrix-table td.row-label{min-width:92px;position:sticky;left:0;z-index:2;box-shadow:8px 0 18px rgba(8,12,46,0.35);}
  .matrix-cell{min-width:78px;gap:3px;}
  .mc-record{font-size:13px;}
  .mc-units{font-size:10px;}
  .mc-roi{font-size:9px;}

  .picks-scroll table{min-width:760px;}
  td.game-cell{max-width:150px;}

  .footer{margin-top:36px;padding-top:16px;}
}

@media (max-width: 640px){
  .page{padding:0 12px 56px;}
  .header{padding-top:16px;margin-bottom:22px;}
  .header-logo{max-width:260px;}

  .hero-grid{
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:8px;
    margin-bottom:24px;
  }
  .hero-card{padding:14px 10px;}
  .hero-value{font-size:18px;line-height:1;}
  .hero-label{font-size:8px;letter-spacing:0.1em;}
  .hero-sub{font-size:9px;line-height:1.2;}

  .hero-note{margin:-4px 0 18px;font-size:9px;}
  .hero-note span{padding:6px 9px;}

  .section-header{margin-top:30px;padding-bottom:8px;}
  .section-title{font-size:11px;}
  .section-badge{font-size:9px;padding:3px 7px;}

  .period-grid{grid-template-columns:repeat(3, minmax(0, 1fr));gap:8px;}
  .period-card{padding:12px 10px;}
  .period-label{font-size:8px;letter-spacing:0.1em;margin-bottom:8px;}
  .period-record{font-size:17px;margin-bottom:4px;}
  .period-stats{display:grid;grid-template-columns:1fr;gap:6px;margin-top:8px;}
  .period-stat{font-size:10px;}
  .period-stat-label{font-size:8px;}

  th, td{padding:9px 10px;font-size:12px;}
  .pill{padding:3px 8px;font-size:11px;}

  .matrix-table{min-width:560px;}
  .matrix-table th,
  .matrix-table td.row-label{padding:9px 10px;font-size:8px;letter-spacing:0.1em;}
  .matrix-table td{padding:9px 10px;}
  .matrix-table th.row-header,
  .matrix-table td.row-label{min-width:78px;}
  .matrix-table td.row-label{letter-spacing:0.1em;}
  .matrix-cell{min-width:66px;}
  .mc-record{font-size:12px;}
  .mc-units{font-size:9px;}
  .mc-roi{font-size:8px;}

  .picks-scroll table{min-width:680px;}
  td.game-cell{max-width:120px;}

  .footer-refresh{font-size:10px;}
}



/* MOBILE-ONLY ALTERNATE LAYOUTS */
.mobile-only{display:none;}
.desktop-only{display:block;}
.compact-matrix-list{display:grid;gap:10px;}
.compact-matrix-card{
  background:rgba(13,18,64,0.62);
  border:1px solid rgba(80,150,255,0.14);
  border-radius:12px;
  padding:12px;
}
.compact-matrix-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.compact-matrix-title{
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:#eef2ff;
}
.compact-matrix-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.compact-stat{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(120,138,255,0.12);
  border-radius:10px;
  padding:8px 6px;
  text-align:center;
}
.compact-stat-label{
  display:block;
  font-family:'DM Mono',monospace;
  font-size:8px;
  letter-spacing:0.10em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:4px;
}
.compact-stat .mc-record{font-size:12px;display:block;}
.compact-stat .mc-units{font-size:9px;display:block;}
.compact-stat .mc-roi{font-size:8px;display:block;}
.mobile-picks-list{display:grid;gap:10px;}
.mobile-pick-card{
  background:rgba(13,18,64,0.62);
  border:1px solid rgba(80,150,255,0.14);
  border-radius:12px;
  padding:12px;
}
.mobile-pick-top,
.mobile-pick-bottom{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.mobile-pick-top{margin-bottom:8px;flex-wrap:wrap;}
.mobile-pick-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.mobile-pick-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.mobile-pick-game{font-size:13px;font-weight:600;line-height:1.3;color:var(--text);margin-bottom:6px;}
.mobile-pick-play{font-size:12px;line-height:1.35;color:var(--dim);margin-bottom:8px;}
.mobile-pick-bottom{font-family:'DM Mono',monospace;font-size:11px;flex-wrap:wrap;}
.mobile-pick-bottom-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
@media (max-width: 640px){
  .desktop-only{display:none !important;}
  .mobile-only{display:block;}
  .matrix-wrap{overflow:visible;padding-bottom:0;}
  .matrix-table{min-width:0;table-layout:fixed;width:100%;}
  .matrix-table th,.matrix-table td{padding:6px 4px;}
  .matrix-table th,.matrix-table td.row-label{font-size:7px;letter-spacing:0.06em;}
  .matrix-table th.row-header,.matrix-table td.row-label{min-width:0;position:static;box-shadow:none;}
  .matrix-cell{min-width:auto;gap:2px;}
  .mc-record{font-size:10px;}
  .mc-units{font-size:8px;}
  .mc-roi{font-size:7px;}
  .picks-scroll{overflow:visible;}
  .picks-scroll table{min-width:0;width:100%;}
}


.matrix-table td, .matrix-table th{text-align:center;vertical-align:middle;}

/* PROFIT CHART */
.chart-card{
  background:rgba(13,18,64,0.65);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(30,40,96,0.6);
  border-radius:14px;
  padding:20px 22px 18px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
  animation:fadeUp 0.5s ease both;
}
.chart-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--strong),var(--gold),transparent);
}
.chart-header{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:14px;
}
.chart-title{
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--dim);
}
.chart-summary{
  display:flex;
  gap:14px;
  align-items:center;
  font-family:'DM Mono',monospace;
  font-size:11px;
  flex-wrap:wrap;
}
.chart-summary-item{display:flex;align-items:center;gap:6px;}
.chart-summary-label{color:var(--muted);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;}
.chart-summary-val{font-weight:500;}
.chart-svg-wrap{
  width:100%;
  position:relative;
}
.chart-svg{
  width:100%;
  height:auto;
  display:block;
  overflow:visible;
}
.chart-grid-line{stroke:rgba(120,138,255,0.10);stroke-width:1;}
.chart-axis-line{stroke:rgba(120,138,255,0.25);stroke-width:1;}
.chart-zero-line{stroke:rgba(160,176,255,0.30);stroke-width:1;stroke-dasharray:3 3;}
.chart-axis-label{
  font-family:'DM Mono',monospace;
  font-size:10px;
  fill:var(--muted);
  letter-spacing:0.04em;
}
.chart-area-pos{fill:rgba(74,222,128,0.12);}
.chart-area-neg{fill:rgba(248,113,113,0.12);}
.chart-line{
  fill:none;
  stroke:url(#chartLineGradient);
  stroke-width:2;
  stroke-linejoin:round;
  stroke-linecap:round;
}
.chart-dot{
  fill:var(--bg);
  stroke:var(--strong);
  stroke-width:1.5;
  cursor:pointer;
  transition:r 0.15s ease;
}
.chart-dot:hover{r:5;}
.chart-hover-line{stroke:rgba(160,176,255,0.45);stroke-width:1;stroke-dasharray:3 3;pointer-events:none;}
.chart-tooltip{
  position:absolute;
  pointer-events:none;
  background:rgba(13,18,64,0.96);
  border:1px solid rgba(80,150,255,0.35);
  border-radius:8px;
  padding:8px 11px;
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--text);
  white-space:nowrap;
  z-index:10;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
  transform:translate(-50%, -110%);
  opacity:0;
  transition:opacity 0.12s ease;
}
.chart-tooltip.visible{opacity:1;}
.chart-tooltip-date{color:var(--dim);font-size:10px;margin-bottom:3px;letter-spacing:0.04em;}
.chart-tooltip-val{font-size:13px;font-weight:500;}
.chart-tooltip-row{font-size:10px;color:var(--muted);margin-top:2px;}

/* DATE RANGE CONTROLS */
.chart-controls{
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid rgba(30,40,96,0.5);
}
.chart-controls-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.chart-date-inputs{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.chart-date-input{
  background:rgba(8,12,46,0.7);
  border:1px solid rgba(80,150,255,0.25);
  border-radius:7px;
  padding:6px 9px;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:0.04em;
  outline:none;
  transition:border-color 0.2s ease, box-shadow 0.2s ease;
  color-scheme:dark;
}
.chart-date-input:focus{
  border-color:var(--strong);
  box-shadow:0 0 0 2px rgba(80,150,255,0.18);
}
.chart-date-sep{
  color:var(--muted);
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:0.06em;
}
.chart-preset-btns{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.chart-preset-btn{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:5px 11px;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.2s ease;
  border:1px solid rgba(80,150,255,0.18);
  background:transparent;
  color:var(--muted);
}
.chart-preset-btn:hover{border-color:rgba(80,150,255,0.35);color:var(--dim);}
.chart-preset-btn.active{
  background:rgba(80,150,255,0.14);
  border-color:rgba(80,150,255,0.4);
  color:var(--strong);
  font-weight:500;
}

/* DUAL-HANDLE RANGE SLIDER */
.chart-slider-wrap{
  position:relative;
  height:36px;
  padding:0 10px;
  margin-top:4px;
}
.chart-slider-track{
  position:absolute;
  top:50%;
  left:10px;
  right:10px;
  height:4px;
  transform:translateY(-50%);
  background:rgba(30,40,96,0.7);
  border-radius:3px;
}
.chart-slider-range{
  position:absolute;
  top:0;
  bottom:0;
  background:linear-gradient(90deg,var(--strong),var(--gold));
  border-radius:3px;
}
.chart-slider-input{
  position:absolute;
  top:50%;
  left:10px;
  right:10px;
  width:calc(100% - 20px);
  height:4px;
  transform:translateY(-50%);
  -webkit-appearance:none;
  appearance:none;
  background:none;
  pointer-events:none;
  outline:none;
  margin:0;
  padding:0;
}
.chart-slider-input::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  pointer-events:auto;
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--bg);
  border:2px solid var(--strong);
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
  transition:transform 0.15s ease, border-color 0.15s ease;
}
.chart-slider-input::-webkit-slider-thumb:hover{
  transform:scale(1.15);
  border-color:var(--gold);
}
.chart-slider-input::-moz-range-thumb{
  pointer-events:auto;
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--bg);
  border:2px solid var(--strong);
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
  transition:transform 0.15s ease, border-color 0.15s ease;
}
.chart-slider-input::-moz-range-thumb:hover{
  transform:scale(1.15);
  border-color:var(--gold);
}
.chart-slider-input.upper{z-index:2;}
.chart-slider-input.lower{z-index:3;}
.chart-slider-labels{
  display:flex;
  justify-content:space-between;
  margin-top:2px;
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:var(--muted);
  letter-spacing:0.04em;
  padding:0 4px;
}
.chart-empty{
  text-align:center;
  padding:40px 20px;
  font-family:'DM Mono',monospace;
  font-size:12px;
  color:var(--muted);
  letter-spacing:0.04em;
}

@media (max-width: 640px){
  .chart-card{padding:16px 14px 14px;}
  .chart-header{margin-bottom:10px;}
  .chart-title{font-size:10px;}
  .chart-summary{gap:10px;font-size:10px;}
  .chart-summary-label{font-size:9px;}
  .chart-controls-top{gap:10px;justify-content:center;}
  .chart-date-inputs{display:none;}
  .chart-preset-btn{font-size:9px;padding:4px 9px;}
  .chart-axis-label{font-size:9px;}
}
</style>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUE1szEB9gT-3u5WfntOBD4kgm5zQ82lW27W3XwyNpOHV7O1X1SdKovR-ErOls6Q2gHb5BRTGmccdY/pub?gid=2022854150&single=true&output=csv';

function parseCSV(text) {
  const lines = text.split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const values = parseCSVLine(line);
    const row = {};
    headers.forEach((h, idx) => { row[h.trim()] = (values[idx] || '').trim(); });
    if ((row['Result'] === 'W' || row['Result'] === 'L' || row['Result'] === 'P') && row['Tier'] !== 'LEAN') rows.push(row);
  }
  return rows;
}

function parseTodayPicks(text) {
  const lines = text.split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  const rows = [];
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const values = parseCSVLine(line);
    const row = {};
    headers.forEach((h, idx) => { row[h.trim()] = (values[idx] || '').trim(); });
    const result = row['Result'] || '';
    const date = row['Date'] || '';
    if (!result && date && date.startsWith(todayStr)) {
      rows.push(row);
    }
  }
  return rows;
}

function parseCSVLine(line) {
  const result = []; let current = ''; let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { result.push(current); current = ''; }
      else { current += ch; }
    }
  }
  result.push(current);
  return result;
}

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function sliceStats(picks, days) {
  const cutoff = new Date();
  cutoff.setHours(0,0,0,0);
  cutoff.setDate(cutoff.getDate() - days);
  const subset = picks.filter(p => {
    const d = parseDate(p['Date']);
    return d && d >= cutoff;
  });
  return calcBasicStats(subset);
}

function calcBasicStats(picks) {
  let wins=0, losses=0, pushes=0, units=0;
  picks.forEach(p => {
    const profit = parseFloat(p['Profit']) || 0;
    units += profit;
    if (p['Result']==='W') wins++;
    else if (p['Result']==='L') losses++;
    else pushes++;
  });
  const total = wins + losses;
  const winPct = total > 0 ? (wins/total*100) : 0;
  const roi = (wins+losses+pushes) > 0 ? (units/(wins+losses+pushes)*100) : 0;
  return {wins, losses, pushes, units, winPct, roi, total: picks.length};
}

function computeStats(picks) {
  const base = calcBasicStats(picks);
  const stats = { ...base, bySport:{}, byMarket:{}, bySportMarket:{} };

  const sportOrder = ['NBA','NCAAB','MLB'];
  const mktOrder   = ['spread','total','moneyline'];

  picks.forEach(p => {
    const profit = parseFloat(p['Profit']) || 0;
    const sport  = p['Sport']  || 'Other';
    const market = p['Market'] || 'Other';
    const res    = p['Result'];

    const bump = (obj, key) => {
      if (!obj[key]) obj[key] = {wins:0,losses:0,pushes:0,units:0};
      obj[key].units += profit;
      if (res==='W') obj[key].wins++;
      else if (res==='L') obj[key].losses++;
      else obj[key].pushes++;
    };
    bump(stats.bySport, sport);
    bump(stats.byMarket, market);

    // Sport x Market matrix
    if (!stats.bySportMarket[sport]) stats.bySportMarket[sport] = {};
    bump(stats.bySportMarket[sport], market);
  });

  stats.allSports = [...new Set([...sportOrder, ...Object.keys(stats.bySport)])].filter(s => stats.bySport[s]);
  stats.allMkts   = [...new Set([...mktOrder,   ...Object.keys(stats.byMarket)])].filter(m => stats.byMarket[m]);

  stats.recent = picks.slice(-30).reverse();

  // Period stats
  stats.last7  = sliceStats(picks, 7);
  stats.last15 = sliceStats(picks, 15);
  stats.last30 = sliceStats(picks, 30);

  // Daily profit time series (sorted ascending by date, with cumulative running total)
  stats.dailyProfits = buildDailyProfitSeries(picks);

  return stats;
}

// Build a sorted, day-by-day profit series. Each entry holds the calendar date,
// the profit booked that day, the cumulative profit through that day, the
// number of picks that day, and W/L/P counts so the chart summary can show
// record and ROI for any selected window.
//
// IMPORTANT: dates from the sheet arrive as YYYY-MM-DD. `new Date('YYYY-MM-DD')`
// parses these as UTC midnight, which becomes the *previous* day in any
// timezone west of UTC — that's why a 4/30 pick was disappearing for an
// EDT user. We parse the YYYY-MM-DD prefix explicitly into local time here
// to keep day buckets aligned with the sheet's intent.
function buildDailyProfitSeries(picks) {
  const dayMap = {};
  picks.forEach(p => {
    const raw = (p['Date'] || '').trim();
    if (!raw) return;
    const m = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
    let dateObj;
    if (m) {
      dateObj = new Date(parseInt(m[1],10), parseInt(m[2],10) - 1, parseInt(m[3],10));
    } else {
      const fallback = parseDate(raw);
      if (!fallback) return;
      dateObj = new Date(fallback.getFullYear(), fallback.getMonth(), fallback.getDate());
    }
    const key = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
    if (!dayMap[key]) dayMap[key] = { dateKey: key, dateObj, profit: 0, picks: 0, wins: 0, losses: 0, pushes: 0 };
    const profit = parseFloat(p['Profit']);
    if (!isNaN(profit)) dayMap[key].profit += profit;
    dayMap[key].picks += 1;
    if (p['Result'] === 'W') dayMap[key].wins += 1;
    else if (p['Result'] === 'L') dayMap[key].losses += 1;
    else if (p['Result'] === 'P') dayMap[key].pushes += 1;
  });
  const arr = Object.values(dayMap).sort((a,b) => a.dateObj - b.dateObj);
  let running = 0;
  arr.forEach(d => { running += d.profit; d.cumulative = running; });
  return arr;
}

function cleanUnicode(str) {
  let result = '';
  for (const ch of str) {
    const code = ch.codePointAt(0);
    if (code >= 0x1D5D4 && code <= 0x1D5ED) result += String.fromCharCode(code - 0x1D5D4 + 65);
    else if (code >= 0x1D5EE && code <= 0x1D607) result += String.fromCharCode(code - 0x1D5EE + 97);
    else if (code >= 0x1D7EC && code <= 0x1D7F5) result += String.fromCharCode(code - 0x1D7EC + 48);
    else result += ch;
  }
  return result;
}

function fmtUnits(u) {
  const sign = u >= 0 ? '+' : '';
  return `${sign}${u.toFixed(2)}u`;
}
function fmtROI(r) {
  const sign = r >= 0 ? '+' : '';
  return `${sign}${r.toFixed(1)}%`;
}
function unitClass(u) { return u >= 0 ? 'val-green' : 'val-red'; }
function roiClass(r)  { return r >= 0 ? 'val-green' : 'val-red'; }

function cleanGameField(game) {
  return cleanUnicode(game || '').replace(/\s+\d{1,2}\/\d{1,2}$/, '').trim();
}
function fmtOddsValue(odds) {
  const raw = `${odds ?? ''}`.trim();
  if (!raw) return '';
  return raw.startsWith('-') || raw.startsWith('+') ? raw : `+${raw}`;
}

function renderMatrixCell(data) {
  if (!data) return `<td><span class="mc-empty">—</span></td>`;
  const total = data.wins + data.losses;
  const roi = (data.wins + data.losses + data.pushes) > 0 ? (data.units / (data.wins + data.losses + data.pushes) * 100) : 0;
  const uSign = data.units >= 0 ? '+' : '';
  const uCls  = data.units >= 0 ? 'val-green' : 'val-red';
  const rSign = roi >= 0 ? '+' : '';
  const rCls  = roi >= 0 ? 'val-green' : 'val-red';
  const record = `${data.wins}-${data.losses}${data.pushes > 0 ? `-${data.pushes}` : ''}`;
  return `<td>
    <div class="matrix-cell">
      <span class="mc-record">${record}</span>
      <span class="mc-units ${uCls}">${uSign}${data.units.toFixed(2)}u</span>
      <span class="mc-roi ${rCls}">${rSign}${roi.toFixed(2)}% ROI</span>
    </div>
  </td>`;
}

function renderPeriodCard(label, s, colorClass) {
  const recClass = s.wins > s.losses ? 'val-green' : s.losses > s.wins ? 'val-red' : 'val-blue';
  return `<div class="period-card ${colorClass}">
    <div class="period-label">${label}</div>
    <div class="period-record ${recClass}">${s.wins}-${s.losses}${s.pushes > 0 ? '-'+s.pushes : ''}</div>
    <div class="period-stats">
      <div>

function renderCompactMatrixStat(label, data) {
  if (!data) {
    return `<div class="compact-stat"><span class="compact-stat-label">${label}</span><span class="mc-empty">—</span></div>`;
  }
  const roi = (data.wins + data.losses + data.pushes) > 0 ? (data.units / (data.wins + data.losses + data.pushes) * 100) : 0;
  const uSign = data.units >= 0 ? '+' : '';
  const uCls  = data.units >= 0 ? 'val-green' : 'val-red';
  const rSign = roi >= 0 ? '+' : '';
  const rCls  = roi >= 0 ? 'val-green' : 'val-red';
  const record = `${data.wins}-${data.losses}${data.pushes > 0 ? `-${data.pushes}` : ''}`;
  return `<div class="compact-stat">
    <span class="compact-stat-label">${label}</span>
    <span class="mc-record">${record}</span>
    <span class="mc-units ${uCls}">${uSign}${data.units.toFixed(2)}u</span>
    <span class="mc-roi ${rCls}">${rSign}${roi.toFixed(2)}%</span>
  </div>`;
}

function formatTimeEST(timeStr) {
  if (!timeStr) return '';
  // Input could be "1:10 PM", "07:15PM", "7:15 PM", etc.
  let t = timeStr.trim().toUpperCase().replace(/\s+/g, '');
  // Ensure space before AM/PM for parsing
  const ampm = t.match(/(AM|PM)$/);
  if (!ampm) return timeStr;
  const suffix = ampm[1];
  const timePart = t.replace(/(AM|PM)$/, '').replace(':',':');
  return `${timePart}${suffix} EST`;
}

let currentTab = 'results';
let cachedCSVText = null;
// Holds the most recently computed daily profit series so the chart's
// date controls can re-render without re-parsing the whole CSV.
let chartSeries = [];
let chartState = { startMs: null, endMs: null, preset: '30' };

// ── PROFIT CHART ──────────────────────────────────────────────
// Format a Date as YYYY-MM-DD for <input type="date"> values.
function fmtDateInput(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// Format a Date for axis ticks / tooltip headers (e.g. "May 1").
function fmtDateShort(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtDateLong(d) {
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}
// Strip the time portion off a date so range comparisons are inclusive of
// the entire calendar day.
function startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
}

function initProfitChart() {
  if (!chartSeries.length) {
    const wrap = document.getElementById('chartSvgWrap');
    if (wrap) wrap.innerHTML = '<div class="chart-empty">No completed picks available to chart yet.</div>';
    return;
  }

  // Domain: earliest pick date → yesterday. We cap at "today − 1" because
  // today's results aren't booked yet — picks for today still have empty
  // Result fields and won't be in the parsed series at all, so showing today
  // on the axis would just produce an empty trailing edge. Yesterday is the
  // most recent day with finalized results.
  const minMs = startOfDay(chartSeries[0].dateObj);
  const today = new Date();
  const yesterdayMs = startOfDay(new Date(today.getFullYear(), today.getMonth(), today.getDate() - 1));
  const lastDataMs = startOfDay(chartSeries[chartSeries.length - 1].dateObj);
  // If for any reason the latest pick is older than yesterday, fall back to it.
  // If the latest pick is somehow today, clamp it to yesterday so we never
  // expose a partial day.
  const maxMs = Math.min(yesterdayMs, Math.max(lastDataMs, yesterdayMs));

  // Default range = all time so users see the full season at a glance.
  chartState.startMs = minMs;
  chartState.endMs = maxMs;
  chartState.preset = 'all';
  // Stash the absolute domain so the slider can map [0..1000] -> ms.
  chartState.domainMin = minMs;
  chartState.domainMax = maxMs;

  // Initialize date inputs
  const startInput = document.getElementById('chartDateStart');
  const endInput = document.getElementById('chartDateEnd');
  if (startInput && endInput) {
    startInput.min = fmtDateInput(new Date(minMs));
    startInput.max = fmtDateInput(new Date(maxMs));
    endInput.min = fmtDateInput(new Date(minMs));
    endInput.max = fmtDateInput(new Date(maxMs));
    startInput.value = fmtDateInput(new Date(chartState.startMs));
    endInput.value = fmtDateInput(new Date(maxMs));
    startInput.addEventListener('change', onDateInputChange);
    endInput.addEventListener('change', onDateInputChange);
  }

  // Initialize slider — range inputs use 0..1000 for finer granularity than
  // the default 100 step, then we map back to milliseconds.
  const lower = document.getElementById('chartSliderLower');
  const upper = document.getElementById('chartSliderUpper');
  if (lower && upper) {
    lower.min = 0; lower.max = 1000;
    upper.min = 0; upper.max = 1000;
    lower.addEventListener('input', onSliderInput);
    upper.addEventListener('input', onSliderInput);
  }

  // Slider edge labels show the absolute earliest/latest available dates
  document.getElementById('chartSliderLabelMin').textContent = fmtDateShort(new Date(minMs));
  document.getElementById('chartSliderLabelMax').textContent = fmtDateShort(new Date(maxMs));

  // Preset buttons
  document.querySelectorAll('.chart-preset-btn').forEach(btn => {
    btn.addEventListener('click', () => onPresetClick(btn.dataset.preset));
  });

  syncSliderFromState();
  renderChart();
}

function msToSliderPos(ms) {
  const span = chartState.domainMax - chartState.domainMin;
  if (span <= 0) return 0;
  return Math.round(((ms - chartState.domainMin) / span) * 1000);
}
function sliderPosToMs(pos) {
  const span = chartState.domainMax - chartState.domainMin;
  // Snap slider positions to whole days so dragging never lands on a
  // half-day that the date inputs can't represent.
  const ms = chartState.domainMin + (pos / 1000) * span;
  return startOfDay(new Date(ms));
}

function syncSliderFromState() {
  const lower = document.getElementById('chartSliderLower');
  const upper = document.getElementById('chartSliderUpper');
  const range = document.getElementById('chartSliderRange');
  if (!lower || !upper || !range) return;
  const lowPos = msToSliderPos(chartState.startMs);
  const highPos = msToSliderPos(chartState.endMs);
  lower.value = lowPos;
  upper.value = highPos;
  range.style.left = (lowPos / 10) + '%';
  range.style.width = ((highPos - lowPos) / 10) + '%';
}

function onSliderInput() {
  const lower = document.getElementById('chartSliderLower');
  const upper = document.getElementById('chartSliderUpper');
  let lowPos = parseInt(lower.value, 10);
  let highPos = parseInt(upper.value, 10);
  // Enforce a minimum 1-day gap so the chart always has something to draw.
  if (highPos - lowPos < Math.max(1, Math.round(1000 / Math.max(1, (chartState.domainMax - chartState.domainMin) / 86400000)))) {
    if (this === lower) {
      lowPos = Math.max(0, highPos - 1);
      lower.value = lowPos;
    } else {
      highPos = Math.min(1000, lowPos + 1);
      upper.value = highPos;
    }
  }
  chartState.startMs = sliderPosToMs(lowPos);
  chartState.endMs = sliderPosToMs(highPos);
  chartState.preset = 'custom';
  // Reflect changes in the date inputs and presets, then redraw.
  document.getElementById('chartDateStart').value = fmtDateInput(new Date(chartState.startMs));
  document.getElementById('chartDateEnd').value = fmtDateInput(new Date(chartState.endMs));
  updatePresetButtons();
  syncSliderFromState();
  renderChart();
}

function onDateInputChange() {
  const startInput = document.getElementById('chartDateStart');
  const endInput = document.getElementById('chartDateEnd');
  // The native date input gives us YYYY-MM-DD. Parse it as a local date so it
  // doesn't shift by a timezone offset.
  const parseLocal = (str) => {
    const [y,m,d] = str.split('-').map(n => parseInt(n,10));
    return new Date(y, m-1, d).getTime();
  };
  let s = parseLocal(startInput.value);
  let e = parseLocal(endInput.value);
  if (isNaN(s) || isNaN(e)) return;
  // Clamp into the available domain and ensure start <= end.
  s = Math.max(chartState.domainMin, Math.min(chartState.domainMax, s));
  e = Math.max(chartState.domainMin, Math.min(chartState.domainMax, e));
  if (s > e) { const tmp = s; s = e; e = tmp; }
  chartState.startMs = s;
  chartState.endMs = e;
  chartState.preset = 'custom';
  startInput.value = fmtDateInput(new Date(s));
  endInput.value = fmtDateInput(new Date(e));
  updatePresetButtons();
  syncSliderFromState();
  renderChart();
}

function onPresetClick(preset) {
  chartState.preset = preset;
  const endMs = chartState.domainMax;
  let startMs;
  if (preset === 'all') {
    startMs = chartState.domainMin;
  } else {
    const days = parseInt(preset, 10);
    startMs = Math.max(chartState.domainMin, endMs - days * 86400000);
  }
  chartState.startMs = startMs;
  chartState.endMs = endMs;
  document.getElementById('chartDateStart').value = fmtDateInput(new Date(startMs));
  document.getElementById('chartDateEnd').value = fmtDateInput(new Date(endMs));
  updatePresetButtons();
  syncSliderFromState();
  renderChart();
}

function updatePresetButtons() {
  document.querySelectorAll('.chart-preset-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.preset === chartState.preset);
  });
}

function renderChart() {
  const wrap = document.getElementById('chartSvgWrap');
  const summary = document.getElementById('chartSummary');
  if (!wrap) return;

  // Filter the daily series to the selected window. Each filtered point's
  // `cumulative` is the running total across ALL picks (not just the window),
  // so we re-base it to the window start so the curve begins at the
  // window-start profit baseline.
  const filtered = chartSeries.filter(d => {
    const ms = startOfDay(d.dateObj);
    return ms >= chartState.startMs && ms <= chartState.endMs;
  });

  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="chart-empty">No picks in the selected date range.</div>';
    if (summary) summary.innerHTML = '';
    return;
  }

  // Compute window aggregates for the summary line: profit, W-L-P record,
  // and ROI on a "1 unit per pick" basis (matching how the hero ROI card
  // computes it across the full season).
  const windowProfit = filtered.reduce((acc, d) => acc + d.profit, 0);
  const windowWins = filtered.reduce((acc, d) => acc + d.wins, 0);
  const windowLosses = filtered.reduce((acc, d) => acc + d.losses, 0);
  const windowPushes = filtered.reduce((acc, d) => acc + d.pushes, 0);
  const windowPicks = windowWins + windowLosses + windowPushes;
  const windowROI = windowPicks > 0 ? (windowProfit / windowPicks * 100) : 0;
  // Build cumulative within window for the chart line.
  let cum = 0;
  const points = filtered.map(d => {
    cum += d.profit;
    return { dateObj: d.dateObj, dateMs: startOfDay(d.dateObj), profit: d.profit, picks: d.picks, cumulative: cum };
  });

  // Update summary line above the chart
  if (summary) {
    const profitClass = windowProfit >= 0 ? 'val-green' : 'val-red';
    const profitSign = windowProfit >= 0 ? '+' : '';
    const roiClass = windowROI >= 0 ? 'val-green' : 'val-red';
    const roiSign = windowROI >= 0 ? '+' : '';
    const recordClass = windowWins > windowLosses ? 'val-green' : windowLosses > windowWins ? 'val-red' : 'val-blue';
    const recordStr = `${windowWins}-${windowLosses}${windowPushes > 0 ? '-'+windowPushes : ''}`;
    summary.innerHTML = `
      <div class="chart-summary-item">
        <span class="chart-summary-label">Record</span>
        <span class="chart-summary-val ${recordClass}">${recordStr}</span>
      </div>
      <div class="chart-summary-item">
        <span class="chart-summary-label">Profit</span>
        <span class="chart-summary-val ${profitClass}">${profitSign}${windowProfit.toFixed(2)}u</span>
      </div>
      <div class="chart-summary-item">
        <span class="chart-summary-label">ROI</span>
        <span class="chart-summary-val ${roiClass}">${roiSign}${windowROI.toFixed(1)}%</span>
      </div>
    `;
  }

  // ── Build SVG ──
  // We use a fixed viewBox and let the SVG scale responsively via width:100%.
  const VB_W = 800, VB_H = 280;
  const M = { top: 16, right: 18, bottom: 36, left: 52 };
  const innerW = VB_W - M.left - M.right;
  const innerH = VB_H - M.top - M.bottom;

  // X domain spans the SELECTED window so the curve always fills the chart
  // even if picks only land on a few days inside the range.
  const xMin = chartState.startMs;
  const xMax = chartState.endMs;
  const xSpan = Math.max(1, xMax - xMin);
  const xScale = (ms) => M.left + ((ms - xMin) / xSpan) * innerW;

  // Y domain padded so line never touches edges. Always include 0 so the
  // zero baseline shows whether the window is profitable or not.
  let yLo = Math.min(0, ...points.map(p => p.cumulative));
  let yHi = Math.max(0, ...points.map(p => p.cumulative));
  if (yLo === yHi) { yLo -= 1; yHi += 1; }
  const yPad = (yHi - yLo) * 0.12;
  yLo -= yPad; yHi += yPad;
  const yScale = (v) => M.top + (1 - (v - yLo) / (yHi - yLo)) * innerH;

  // Y ticks — 5 evenly-spaced "nice" values
  const yTicks = niceTicks(yLo, yHi, 5);
  // X ticks — pick a "nice" date interval (1, 2, 3, 5, 7, 14, or 30 days, or
  // monthly) so labels land on round dates the user can locate at a glance.
  // Targeting ~5–7 ticks total. The ticks themselves are placed at calendar
  // boundaries that fall *inside* the window, then we add the start/end as
  // bookends so the chart edges are always labeled.
  const xTicks = niceDateTicks(xMin, xMax, 6);

  // Build line path
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(p.dateMs).toFixed(2)},${yScale(p.cumulative).toFixed(2)}`).join(' ');
  // Area path (line down to zero baseline). Split into pos/neg fills via clip.
  const zeroY = yScale(0);
  const areaPath = `${linePath} L${xScale(points[points.length-1].dateMs).toFixed(2)},${zeroY.toFixed(2)} L${xScale(points[0].dateMs).toFixed(2)},${zeroY.toFixed(2)} Z`;

  let svg = `<svg class="chart-svg" viewBox="0 0 ${VB_W} ${VB_H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`;

  svg += `<defs>
    <linearGradient id="chartLineGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#5096ff"/>
      <stop offset="100%" stop-color="#a06eff"/>
    </linearGradient>
    <clipPath id="chartClipPos"><rect x="0" y="${M.top}" width="${VB_W}" height="${zeroY - M.top}"/></clipPath>
    <clipPath id="chartClipNeg"><rect x="0" y="${zeroY}" width="${VB_W}" height="${(M.top + innerH) - zeroY}"/></clipPath>
  </defs>`;

  // Horizontal gridlines + Y-axis labels
  yTicks.forEach(t => {
    const y = yScale(t).toFixed(2);
    svg += `<line class="chart-grid-line" x1="${M.left}" x2="${M.left + innerW}" y1="${y}" y2="${y}"/>`;
    svg += `<text class="chart-axis-label" x="${M.left - 8}" y="${y}" text-anchor="end" dominant-baseline="middle">${(t >= 0 ? '+' : '') + t.toFixed(1)}u</text>`;
  });
  // Zero baseline (dashed, slightly more visible)
  svg += `<line class="chart-zero-line" x1="${M.left}" x2="${M.left + innerW}" y1="${zeroY.toFixed(2)}" y2="${zeroY.toFixed(2)}"/>`;

  // Filled area beneath the line, split into green-above-zero and red-below-zero.
  svg += `<path d="${areaPath}" class="chart-area-pos" clip-path="url(#chartClipPos)"/>`;
  svg += `<path d="${areaPath}" class="chart-area-neg" clip-path="url(#chartClipNeg)"/>`;

  // Line itself
  svg += `<path d="${linePath}" class="chart-line"/>`;

  // X-axis line + tick marks + tick labels. Each tick gets a small vertical
  // mark on the axis itself plus a centered date label below it so it's
  // visually obvious which point on the chart each label corresponds to.
  svg += `<line class="chart-axis-line" x1="${M.left}" x2="${M.left + innerW}" y1="${M.top + innerH}" y2="${M.top + innerH}"/>`;
  xTicks.forEach((t) => {
    const x = xScale(t).toFixed(2);
    const yAxis = M.top + innerH;
    svg += `<line class="chart-axis-line" x1="${x}" x2="${x}" y1="${yAxis}" y2="${yAxis + 4}"/>`;
    svg += `<text class="chart-axis-label" x="${x}" y="${yAxis + 18}" text-anchor="middle">${fmtDateShort(new Date(t))}</text>`;
  });

  // Hover overlay group (line + dots get drawn last so they sit on top).
  // We draw circles for every data point but make them transparent unless hovered.
  svg += `<g id="chartHoverGroup" style="display:none;">
    <line id="chartHoverLine" class="chart-hover-line" x1="0" x2="0" y1="${M.top}" y2="${M.top + innerH}"/>
    <circle id="chartHoverDot" cx="0" cy="0" r="4" class="chart-dot"/>
  </g>`;

  // Invisible overlay rect to capture pointer events across the plot area.
  svg += `<rect id="chartHoverRect" x="${M.left}" y="${M.top}" width="${innerW}" height="${innerH}" fill="transparent" style="cursor:crosshair;"/>`;

  svg += `</svg><div class="chart-tooltip" id="chartTooltip"></div>`;

  wrap.innerHTML = svg;

  // Hover interactions — find nearest point by x, move the indicator + tooltip.
  const rect = document.getElementById('chartHoverRect');
  const grp = document.getElementById('chartHoverGroup');
  const hLine = document.getElementById('chartHoverLine');
  const hDot = document.getElementById('chartHoverDot');
  const tip = document.getElementById('chartTooltip');
  const svgEl = wrap.querySelector('svg');

  function pointerMove(e) {
    const bbox = svgEl.getBoundingClientRect();
    // Convert client X to viewBox X.
    const vbX = ((e.clientX - bbox.left) / bbox.width) * VB_W;
    // Find the closest data point.
    let nearest = points[0]; let nd = Infinity;
    points.forEach(p => {
      const dx = Math.abs(xScale(p.dateMs) - vbX);
      if (dx < nd) { nd = dx; nearest = p; }
    });
    const cx = xScale(nearest.dateMs);
    const cy = yScale(nearest.cumulative);
    grp.style.display = '';
    hLine.setAttribute('x1', cx); hLine.setAttribute('x2', cx);
    hDot.setAttribute('cx', cx); hDot.setAttribute('cy', cy);
    // Position tooltip in pixel space (relative to the wrap div).
    const tipX = (cx / VB_W) * bbox.width;
    const tipY = (cy / VB_H) * bbox.height;
    const profitSign = nearest.profit >= 0 ? '+' : '';
    const cumSign = nearest.cumulative >= 0 ? '+' : '';
    const cumCls = nearest.cumulative >= 0 ? 'val-green' : 'val-red';
    tip.innerHTML = `
      <div class="chart-tooltip-date">${fmtDateLong(nearest.dateObj)}</div>
      <div class="chart-tooltip-val ${cumCls}">${cumSign}${nearest.cumulative.toFixed(2)}u</div>
      <div class="chart-tooltip-row">Day: ${profitSign}${nearest.profit.toFixed(2)}u · ${nearest.picks} pick${nearest.picks!==1?'s':''}</div>
    `;
    tip.style.left = tipX + 'px';
    tip.style.top = tipY + 'px';
    tip.classList.add('visible');
  }
  function pointerLeave() {
    grp.style.display = 'none';
    tip.classList.remove('visible');
  }
  rect.addEventListener('mousemove', pointerMove);
  rect.addEventListener('mouseleave', pointerLeave);
  rect.addEventListener('touchmove', (e) => { if (e.touches[0]) pointerMove(e.touches[0]); }, { passive: true });
  rect.addEventListener('touchend', pointerLeave);
}

// Generate ~targetCount "nice" round-number ticks that span [lo, hi].
function niceTicks(lo, hi, targetCount) {
  const span = hi - lo;
  if (span <= 0) return [lo];
  const rough = span / Math.max(1, targetCount - 1);
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / mag;
  let step;
  if (norm < 1.5) step = 1 * mag;
  else if (norm < 3) step = 2 * mag;
  else if (norm < 7) step = 5 * mag;
  else step = 10 * mag;
  const start = Math.ceil(lo / step) * step;
  const ticks = [];
  for (let v = start; v <= hi + 1e-9; v += step) ticks.push(parseFloat(v.toFixed(6)));
  return ticks;
}

// Generate "nice" date ticks that fall on round calendar boundaries inside
// [minMs, maxMs]. We pick a step (in days, or monthly) that yields around
// targetCount labels, then snap to multiples of that step from a sensible
// anchor (start of month for monthly, or just every Nth day from minMs for
// daily). The window edges (minMs, maxMs) are always included as bookends
// so the chart's left/right boundaries are always labeled.
function niceDateTicks(minMs, maxMs, targetCount) {
  const DAY = 86400000;
  const spanDays = Math.max(1, Math.round((maxMs - minMs) / DAY));
  // Candidate step intervals in days. "month" is handled specially below.
  const candidates = [1, 2, 3, 5, 7, 14, 'month', 60, 90];
  // Pick the candidate that produces a tick count closest to targetCount.
  let bestStep = 1;
  let bestDiff = Infinity;
  for (const c of candidates) {
    const stepDays = c === 'month' ? 30 : c;
    const count = Math.floor(spanDays / stepDays) + 1;
    const diff = Math.abs(count - targetCount);
    if (diff < bestDiff || (diff === bestDiff && count >= 2)) {
      bestDiff = diff;
      bestStep = c;
    }
  }
  const ticks = [];
  // Always include the window start.
  ticks.push(minMs);
  if (bestStep === 'month') {
    // First-of-month ticks strictly inside the window (we don't double-count
    // the bookends).
    const start = new Date(minMs);
    let cursor = new Date(start.getFullYear(), start.getMonth() + 1, 1).getTime();
    while (cursor <= maxMs) {
      if (cursor - minMs > DAY * 2 && maxMs - cursor > DAY * 2) ticks.push(cursor);
      const d = new Date(cursor);
      cursor = new Date(d.getFullYear(), d.getMonth() + 1, 1).getTime();
    }
  } else {
    // Every Nth day starting one full step in from the window's left edge,
    // so the first interior tick has breathing room from the start label.
    const stepMs = bestStep * DAY;
    let cursor = minMs + stepMs;
    while (cursor < maxMs) {
      // Skip ticks that would crowd the start or end labels.
      if (cursor - minMs > stepMs * 0.5 && maxMs - cursor > stepMs * 0.5) {
        ticks.push(cursor);
      }
      cursor += stepMs;
    }
  }
  // Always include the window end (unless it's already the last tick).
  if (ticks[ticks.length - 1] !== maxMs) ticks.push(maxMs);
  // De-dup and sort just in case.
  return [...new Set(ticks)].sort((a,b) => a - b);
}
// ── END PROFIT CHART ──────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-results').classList.toggle('active', tab === 'results');
  document.getElementById('tab-today').classList.toggle('active', tab === 'today');
  if (cachedCSVText) {
    renderCurrentTab(cachedCSVText);
  }
}

function renderCurrentTab(text) {
  const container = document.getElementById('dashboard');
  if (currentTab === 'results') {
    const picks = parseCSV(text);
    if (picks.length === 0) {
      container.innerHTML = '<div class="error-msg">No pick data found. Make sure the Google Sheet is published.</div>';
      return;
    }
    const stats = computeStats(picks);
    container.innerHTML = renderDashboard(stats);
    chartSeries = stats.dailyProfits || [];
    initProfitChart();
  } else {
    const todayPicks = parseTodayPicks(text);
    container.innerHTML = renderTodayPicks(todayPicks);
  }
}

async function loadDashboard() {
  const container = document.getElementById('dashboard');
  try {
    let text;
    const strategies = [
      () => fetch(CSV_URL, { signal: AbortSignal.timeout(8000) }),
      () => fetch('https://corsproxy.io/?' + encodeURIComponent(CSV_URL), { signal: AbortSignal.timeout(10000) }),
      () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL), { signal: AbortSignal.timeout(10000) }),
      () => fetch('https://thingproxy.freeboard.io/fetch/' + CSV_URL, { signal: AbortSignal.timeout(10000) }),
    ];
    let lastErr;
    for (const strategy of strategies) {
      try {
        const response = await strategy();
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const candidate = await response.text();
        if (candidate.includes(',') && candidate.includes('\n')) { text = candidate; break; }
        throw new Error('Not CSV');
      } catch(err) { lastErr = err; }
    }
    if (!text) throw new Error('All fetch attempts failed: ' + (lastErr?.message || 'unknown'));

    cachedCSVText = text;
    renderCurrentTab(text);
    const now = new Date();
    document.getElementById('lastUpdate').textContent = `Last refreshed: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
  } catch(err) {
    container.innerHTML = `<div class="error-msg">
      Failed to load data: ${err.message}<br><br>
      <span style="color:var(--muted);font-size:11px;">Make sure the Google Sheet is published to web as CSV.<br>
      If opening locally, try refreshing — the proxy may be temporarily unavailable.</span>
    </div>`;
  }
}

loadDashboard();
setInterval(loadDashboard, 5 * 60 * 1000);
</script>
